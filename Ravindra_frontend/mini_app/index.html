<!-- // html -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Inventory Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!--  Shows title of application -->
  <header>
    <h1>Product Inventory Dashboard</h1>
  </header>

  <!--  In this section we have created search box, dropdown for category and sorting and checkbox for low stock products. -->
  <section class="controls">
    <input type="text" id="search" placeholder="Search product...">

    <select id="category">
      <option value="all">All Categories</option>
      <option value="electronics">Electronics</option>
      <option value="clothing">Clothing</option>
      <option value="books">Books</option>
      <option value="accessories">Accessories</option>
    </select>

    <select id="sort">
      <option value="">Sort</option>
      <option value="low">Price Low to High</option>
      <option value="high">Price High to Low</option>
      <option value="az">A to Z</option>
      <option value="za">Z to A</option>
    </select>

    <label>
      <input type="checkbox" id="lowStock"> Low Stock
    </label>
  </section>

  <!-- In this section we display analytics -->
  <section class="analytics">
    <div>Total Products: <span id="total"></span></div>
    <div>Total Value: ₹<span id="value"></span></div>
    <div>Out of Stock: <span id="out"></span></div>
  </section>
  <!-- This is a loader hide after data loads -->
  <p id="loading">Loading products...</p>
  <!-- This is section to display products its by the javascript-->
  <section id="products"></section>

  <!-- Pagination  section -->
  <div id="pagination">
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
  </div>

  <!-- In this section we have add product and edit product functionality -->
  <section class="form">
    <h2>Add / Edit Product</h2>

    <input id="name" placeholder="Product Name">
    <input id="price" type="number" placeholder="Price">
    <input id="stock" type="number" placeholder="Stock">

    <select id="categoryInput">
      <option value="">Select Category</option>
      <option value="electronics">Electronics</option>
      <option value="clothing">Clothing</option>
      <option value="books">Books</option>
      <option value="accessories">Accessories</option>
      <option value="other">Other</option>
    </select>

    <button onclick="addProduct()">Save Product</button>
  </section>

  <script src="script.js"></script>
</body>

</html>
