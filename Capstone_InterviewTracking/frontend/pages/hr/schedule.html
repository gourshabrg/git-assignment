<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Interview – HR Portal</title>
  <link rel="stylesheet" href="../../styles/style.css">
  <link rel="stylesheet" href="../../styles/dashboard.css">
  <link rel="stylesheet" href="../../styles/hr/dashboard.css">
</head>
<body class="hr-body">

  <div class="hr-overlay" id="hr-overlay" onclick="closeSidebar()"></div>

  <div class="hr-layout">

    <aside class="hr-sidebar" id="hr-sidebar" aria-label="HR navigation">
      <header class="hr-brand">
        <div class="brand-mark hr-brand-mark" aria-hidden="true">IT</div>
        <div>
          <p class="hr-brand-name">Interview Tracking</p>
          <p class="hr-brand-sub">HR Portal</p>
        </div>
      </header>
      <nav class="hr-nav" aria-label="Main navigation">
        <a class="hr-nav-item" href="../index.html">
          <svg class="hr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a class="hr-nav-item" href="dashboard.html">
          <svg class="hr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Candidates
        </a>
        <a class="hr-nav-item active" href="schedule.html" aria-current="page">
          <svg class="hr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Schedule Interview
        </a>
        <a class="hr-nav-item" href="panels.html">
          <svg class="hr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Panels
        </a>
        <a class="hr-nav-item" href="jobs.html">
          <svg class="hr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          Jobs
        </a>
        <a class="hr-nav-item" href="hr-interviews.html">
          <svg class="hr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          HR Interviews
        </a>
      </nav>
      <footer class="hr-sidebar-footer">
        <div class="hr-user-card">
          <div class="hr-user-avatar" id="hr-avatar" aria-hidden="true"></div>
          <div class="hr-user-info">
            <p class="hr-user-name" id="hr-user-name"></p>
            <p class="hr-user-email" id="hr-user-email"></p>
          </div>
        </div>
        <button class="hr-logout-btn" onclick="logout()" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </footer>
    </aside>

    <main class="hr-main">
      <div class="hr-topbar" role="banner">
        <button class="hr-menu-btn" onclick="toggleSidebar()" type="button" aria-label="Open navigation menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="hr-topbar-title">Schedule Interview</span>
      </div>

      <section class="hr-section" aria-labelledby="schedule-heading">
        <div class="hr-section-header">
          <h1 id="schedule-heading">Schedule Interview</h1>
        </div>
        <div class="hr-card" style="max-width:640px;">
          <form id="schedule-form" novalidate>

            <div class="form-group">
              <label for="sch-round">Round *</label>
              <select id="sch-round" required onchange="onRoundChange()">
                <option value="">Select round</option>
                <option value="L1">L1</option>
                <option value="L2">L2</option>
                <option value="HR">HR Round</option>
              </select>
            </div>

            <div class="form-group">
              <label>Select Candidate *</label>
              <div class="candidate-picker">
                <input type="text" id="candidate-search" placeholder="Search by name or App ID…" autocomplete="off" oninput="filterCandidatePicker()" aria-label="Search candidates">
                <div class="candidate-picker-list" id="candidate-picker-list" role="listbox">
                  <p style="padding:12px;font-size:13px;color:var(--text-muted);">Loading candidates…</p>
                </div>
                <div class="candidate-selected" id="candidate-selected" style="display:none;" aria-live="polite">
                  <span id="candidate-selected-text"></span>
                  <button type="button" class="candidate-clear-btn" onclick="clearCandidateSelection()" aria-label="Clear candidate selection">✕</button>
                </div>
              </div>
              <input type="hidden" id="sch-appId">
            </div>

            <div class="form-group">
              <label for="sch-datetime">Date &amp; Time *</label>
              <input type="datetime-local" id="sch-datetime" required>
            </div>

            <div class="form-group">
              <label for="sch-focus">Focus Area</label>
              <input type="text" id="sch-focus" placeholder="e.g. Java, System Design, Culture Fit">
            </div>

            <div class="form-group" id="panel-section">
              <label>Select Panel Members (max 2) *</label>
              <div class="panel-checkbox-list" id="panel-checkboxes" role="group" aria-label="Panel member selection">
                <p style="padding:8px;font-size:13px;color:var(--text-muted);">Loading panels…</p>
              </div>
            </div>

            <div id="hr-round-note" style="display:none;background:var(--primary-light);padding:12px 16px;border-radius:8px;border-left:3px solid var(--primary);margin-bottom:16px;">
              <p style="font-size:13px;margin:0;color:var(--primary);font-weight:600;">HR Round — You will conduct this interview directly. An email will be sent to both you and the candidate.</p>
            </div>

            <p id="sch-error" class="error-msg" role="alert"></p>
            <p id="sch-success" class="success-msg" role="status"></p>
            <button type="submit" class="btn" id="sch-btn">Schedule</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../../scripts/main/hr/schedule.js"></script>
</body>
</html>
