<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password</title>
  <link rel="stylesheet" href="../../styles/auth/auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-panel">

      <div class="auth-brand">
        <span class="brand-mark">IT</span>
        <div>
          <p class="eyebrow">Interview Tracking </p>
          <h1>Set Your Password</h1>
        </div>
      </div>

      <form id="set-password-form" class="auth-form">

        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Enter password" required>
          <button type="button" class="eye-toggle" onclick="togglePwd('password', this)" aria-label="Show password">
            <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <label for="confirm-password">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirm-password" placeholder="Confirm password" required>
          <button type="button" class="eye-toggle" onclick="togglePwd('confirm-password', this)" aria-label="Show password">
            <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <button type="submit">Set Password</button>

      </form>

      <p id="error" class="error-message"></p>

    </section>
  </main>

  <script type="module" src="../../scripts/main/auth-controller.js"></script>
</body>

</html>
