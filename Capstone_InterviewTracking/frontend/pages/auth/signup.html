<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link rel="stylesheet" href="../../styles/auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-header">
        <a href="../../index.html" class="home-btn">Home</a>
      </div>
      <div class="auth-brand">
        <span class="brand-mark">IT</span>
        <div>
          <p class="eyebrow">Interview Tracking System</p>
          <h1>Create account</h1>
        </div>
      </div>


      <form id="signup-form" class="auth-form form-container">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Full Name" required />
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>

        <label for="phone">Mobile Number</label>
        <input type="tel" id="phone" placeholder="Enter 10 digit mobile number" maxlength="10" minlength="10"
          required />
        <label>Date of Birth</label>
        <input type="date" id="dob" required />
        <label for="gender">Gender</label>
        <select id="gender" required>
          <option value="">Select Gender</option>
          <option value="MALE">Male</option>
          <option value="FEMALE">Female</option>
          <option value="OTHER">Other</option>
        </select>

        <button type="submit" id="signup-btn">
          <span id="btn-text">Send setup link</span>
          <span id="loader" class="loader hidden"></span>
        </button>
      </form>

      <p id="error" class="error-message"></p>

      <p class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </section>
  </main>

  <script type="module" src="../../scripts/main/auth-controller.js"></script>

</body>

</html>
