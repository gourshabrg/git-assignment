<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link rel="stylesheet" href="../../styles/auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-brand">
        <span class="brand-mark">IT</span>
        <div>
          <p class="eyebrow">Interview Tracking System</p>
          <h1>Create account</h1>
        </div>
      </div>


      <form id="signupForm" class="auth-form">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password" required>

        <label for="role">Account type</label>
        <select id="role" required>
          <option value="CANDIDATE">Candidate</option>
          <option value="HR">HR</option>
        </select>

        <button type="submit">Create account</button>
      </form>

      <p id="error" class="error-message"></p>

      <p class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </section>
  </main>

  <script src="../../scripts/api/authApi.js"></script>
  <script src="../../scripts/utils/storage.js"></script>
  <script src="../../scripts/main/authController.js"></script>

</body>

</html>
